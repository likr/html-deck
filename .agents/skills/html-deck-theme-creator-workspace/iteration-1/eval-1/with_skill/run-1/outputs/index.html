<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon custom Theme Demo - With Skill</title>
  <script type="module" src="https://unpkg.com/html-deck@1.0.0-alpha.2"></script>
  <style>
    :root {
      /* Core colors */
      --hd-theme-background-color: #050505;
      --hd-theme-text-color: #10b981;
      --hd-theme-main-color: #ff007f;
      --hd-theme-accent-color: #00f2fe;

      /* Devised colors - maintaining high contrast and derivation principles */
      --hd-base-soft-background-color: var(--hd-theme-background-color);
      
      /* Text opacity is kept at 1.0 (>= 0.85 threshold) for maximum readability */
      --hd-base-soft-text-color: rgba(from var(--hd-theme-text-color) r g b / 1.0); /* Bright green! Contrast is high (~6.2:1) */
      --hd-base-soft-text-highlight-color: var(--hd-theme-main-color); /* Derived from main pink */
      
      /* Derived secondary background shades */
      --hd-card-background-color: rgba(from var(--hd-theme-text-color) r g b / 0.08); /* Derived translucency */
    }
  </style>
</head>
<body>
  <hd-deck>
    <hd-slide>
      <hd-layout-cover title="Neon Theme" subtitle="Demonstrating custom colors"></hd-layout-cover>
    </hd-slide>
  </hd-deck>
</body>
</html>
